<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>云创客户跟进 App 登录</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://lf-scm-cn.feishucdn.com/lark/op/h5-js-sdk-1.5.44.js"></script>
  </head>
  <body class="login-page">
    <main class="login-shell">
      <form id="loginForm" class="login-card">
        <p class="eyebrow">温州龙湖·云创未来社区</p>
        <h1>一客一策</h1>
        <p id="loginIntro">正在通过飞书免登进入应用</p>
        <label id="passwordLabel" hidden>
          <span>访问密码</span>
          <input id="passwordInput" type="password" autocomplete="current-password" autofocus />
        </label>
        <button id="loginButton" class="primary-button" type="submit" hidden>进入应用</button>
        <span id="loginMessage" class="login-message"></span>
      </form>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
