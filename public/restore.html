<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>迁移本机客户数据</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <form id="restoreForm" class="login-card restore-card">
        <p class="eyebrow">温州龙湖·云创未来社区</p>
        <h1>迁移本机客户数据</h1>
        <p>选择本机旧版的 <strong>data/customers.json</strong>，导入到当前云端数据库。</p>
        <label>
          <span>客户数据备份文件</span>
          <input id="restoreFile" type="file" accept="application/json,.json" />
        </label>
        <div id="restorePreview" class="restore-preview">尚未选择文件</div>
        <button class="primary-button" type="submit">导入到云端</button>
        <span id="restoreMessage" class="login-message"></span>
        <a class="text-button restore-link" href="/">返回应用</a>
      </form>
    </main>
    <script src="/restore.js"></script>
  </body>
</html>
